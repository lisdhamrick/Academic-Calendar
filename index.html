<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Leander ISD Academic Calendar</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="calendar-app">
      <header class="app-header">
        <div class="brand-block">
          <img
            class="district-logo"
            src="./assets/district-logo.svg"
            alt="Leander ISD logo"
          />
          <img
            class="icon-logo"
            src="./assets/icon-logo.svg"
            alt=""
            aria-hidden="true"
          />
          <div class="brand-text">
            <h1>Academic Calendar</h1>
            <p class="school-year" id="schoolYearLabel"></p>
          </div>
        </div>
      </header>

      <div class="app-layout">
        <section class="calendar-grid" id="calendarGrid" aria-label="Academic calendar months"></section>

        <aside class="info-panel">
          <section>
            <h2>Important Dates</h2>
            <ul id="importantDates"></ul>
          </section>
        </aside>
      </div>

      <section class="legend" id="legend"></section>
    </main>
    <button
      class="legend-fab"
      id="legendFab"
      type="button"
      aria-controls="legend"
      aria-expanded="false"
      aria-label="Toggle legend"
    >
      Key
    </button>
    <div class="legend-backdrop" id="legendBackdrop" aria-hidden="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
